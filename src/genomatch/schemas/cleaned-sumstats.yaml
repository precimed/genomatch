$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://biopsyk.dk/schemas/cleansumstats/cleaned-sumstats/0.1.0.yaml"
title: "Cleaned sumstats"
definitions:
  nucleotide:
    type: string
    enum: ["A", "T", "G", "C"]
  supported_contig_label:
    anyOf:
      - type: integer
        minimum: 1
        maximum: 26
      - type: string
        pattern: "^(?:[1-9]|1[0-9]|2[0-6]|X|Y|MT|chr(?:[1-9]|1[0-9]|2[0-2]|X|Y|M))$"
type: array
items:
  type: object
  properties:
    CHR:
      $ref: "#/definitions/supported_contig_label"
    POS:
      type: integer
      minimum: 1
    SNP:
      type: string
    EffectAllele:
      $ref: "#/definitions/nucleotide"
    OtherAllele:
      $ref: "#/definitions/nucleotide"
    P:
      type: number
    Z:
      type: number
    N:
      type: number
    BETA:
      type: number
    OR:
      type: number
    SE:
      type: number
    ORL95:
      type: number
    ORU95:
      type: number
    CaseN:
      type: number
    ControlN:
      type: number
    StudyN:
      type: number
    INFO:
      type: number
    Direction:
      type: string
    EAF:
      type: number
    CaseEAF:
      type: number
    ControlEAF:
      type: number
  required: ["CHR", "POS", "SNP", "EffectAllele", "OtherAllele", "P"]
