name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to validate for manual runs; defaults to package version when omitted"
        required: false
        type: string
      publish_pypi:
        description: "Publish built artifacts to PyPI"
        required: false
        default: false
        type: boolean
      publish_ghcr:
        description: "Push container image tags to GHCR"
        required: false
        default: false
        type: boolean

jobs:
  verify-version:
    name: Verify Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        id: vars
        run: |
          set -euo pipefail
          pyproject_version="$(python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")"
          module_version="$(python -c "from pathlib import Path; namespace = {}; exec(Path('src/genomatch/_version.py').read_text(encoding='utf-8'), namespace); print(namespace['__version__'])")"

          if [ "$pyproject_version" != "$module_version" ]; then
            echo "pyproject.toml version $pyproject_version does not match src/genomatch/_version.py version $module_version" >&2
            exit 1
          fi

          release_version="$pyproject_version"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$tag_version" != "$pyproject_version" ]; then
              echo "Tag version $tag_version does not match package version $pyproject_version" >&2
              exit 1
            fi
            release_version="$tag_version"
          elif [ -n "${{ github.event.inputs.release_version || '' }}" ]; then
            input_version="${{ github.event.inputs.release_version || '' }}"
            if [ "$input_version" != "$pyproject_version" ]; then
              echo "Manual input version $input_version does not match package version $pyproject_version" >&2
              exit 1
            fi
            release_version="$input_version"
          fi

          echo "version=$release_version" >> "$GITHUB_OUTPUT"

  test:
    name: Test Release Build
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: match-liftover
          cache-environment: false
          create-args: >-
            python=3.12
            bcftools
            bcftools-liftover-plugin
            samtools
            numpy
            pandas
            pysam
            pytest
            pyyaml
            pgenlib
            build
            twine
          condarc: |
            channels:
              - conda-forge
              - bioconda

      - name: Install editable package
        run: micromamba run -n match-liftover python -m pip install -e .

      - name: Run test suite
        run: micromamba run -n match-liftover pytest tests

  build-python-artifacts:
    name: Build Python Artifacts
    needs:
      - verify-version
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build wheel and sdist
        run: |
          set -euo pipefail
          rm -rf build dist src/genomatch.egg-info
          python -P -m build --no-isolation .

      - name: Check built artifacts
        run: python -m twine check dist/*

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-container:
    name: Build Container Image
    needs:
      - verify-version
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build local test image
        run: docker build -t genomatch:test .

  publish-pypi:
    name: Publish PyPI Package
    needs:
      - build-python-artifacts
    if: github.event_name == 'push' || github.event.inputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-ghcr:
    name: Publish GHCR Image
    needs:
      - verify-version
      - test
      - build-container
    if: github.event_name == 'push' || github.event.inputs.publish_ghcr == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/precimed/genomatch:${{ needs.verify-version.outputs.version }}
            ghcr.io/precimed/genomatch:latest
