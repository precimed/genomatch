name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Version to validate for manual runs; defaults to package version when omitted"
        required: false
        type: string
      pypi_target:
        description: "Python package publish target for manual runs"
        required: false
        default: none
        type: choice
        options:
          - none
          - testpypi
          - pypi
      publish_ghcr:
        description: "Push a container image tag to GHCR"
        required: false
        default: false
        type: boolean
      ghcr_tag:
        description: "Custom GHCR tag for manual runs, for example dev"
        required: false
        type: string

jobs:
  verify-version:
    name: Verify Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        id: vars
        run: |
          set -euo pipefail
          pyproject_version="$(python -c "import pathlib, tomllib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'])")"
          module_version="$(python -c "from pathlib import Path; namespace = {}; exec(Path('src/genomatch/_version.py').read_text(encoding='utf-8'), namespace); print(namespace['__version__'])")"
          manual_release_version="${{ github.event.inputs.release_version || '' }}"

          if [ "$pyproject_version" != "$module_version" ]; then
            echo "pyproject.toml version $pyproject_version does not match src/genomatch/_version.py version $module_version" >&2
            exit 1
          fi

          release_version="$pyproject_version"

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "$tag_version" != "$pyproject_version" ]; then
              echo "Tag version $tag_version does not match package version $pyproject_version" >&2
              exit 1
            fi
            release_version="$tag_version"
          elif [ -n "$manual_release_version" ]; then
            if [ "$manual_release_version" != "$pyproject_version" ]; then
              echo "Manual input version $manual_release_version does not match package version $pyproject_version" >&2
              exit 1
            fi
            release_version="$manual_release_version"
          fi

          echo "version=$release_version" >> "$GITHUB_OUTPUT"

  test:
    name: Test Release Build
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: match-liftover
          cache-environment: false
          init-shell: none
          generate-run-shell: false
          create-args: >-
            python=3.12
            bcftools
            bcftools-liftover-plugin
            samtools
            plink
            plink2
            numpy
            pandas
            pysam
            pytest
            pyyaml
            pgenlib
            python-build
            twine
          condarc: |
            channels:
              - conda-forge
              - bioconda

      - name: Install editable package
        run: micromamba run -n match-liftover python -m pip install -e .

      - name: Run test suite
        run: micromamba run -n match-liftover pytest tests

  build-python-artifacts:
    name: Build Python Artifacts
    needs:
      - verify-version
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build twine setuptools wheel

      - name: Build wheel and sdist
        run: |
          set -euo pipefail
          rm -rf build dist src/genomatch.egg-info
          python -P -m build --no-isolation .

      - name: Check built artifacts
        run: python -m twine check dist/*

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  build-container:
    name: Build Container Image
    needs:
      - verify-version
      - test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build local test image
        run: docker build -t genomatch:test .

  publish-pypi:
    name: Publish PyPI Package
    needs:
      - verify-version
      - build-python-artifacts
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.pypi_target == 'pypi')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-testpypi:
    name: Publish TestPyPI Package
    needs:
      - verify-version
      - build-python-artifacts
    if: github.event_name == 'workflow_dispatch' && inputs.pypi_target == 'testpypi'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
    steps:
      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

  publish-ghcr-release:
    name: Publish GHCR Image
    needs:
      - verify-version
      - test
      - build-container
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/precimed/genomatch:${{ needs.verify-version.outputs.version }}
            ghcr.io/precimed/genomatch:latest

  publish-ghcr-manual:
    name: Publish GHCR Manual Tag
    needs:
      - verify-version
      - test
      - build-container
    if: github.event_name == 'workflow_dispatch' && inputs.publish_ghcr && inputs.ghcr_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate manual GHCR tag
        run: |
          set -euo pipefail
          case "${{ inputs.ghcr_tag }}" in
            *[!A-Za-z0-9._-]*)
              echo "Manual GHCR tag contains unsupported characters: ${{ inputs.ghcr_tag }}" >&2
              exit 1
              ;;
          esac

      - name: Build and push manual image tag
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/precimed/genomatch:${{ inputs.ghcr_tag }}
